name: 测试

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖（轻量，仅测试所需）
        run: |
          pip install --upgrade pip
          pip install pytest loguru pydantic tenacity redis httpx

      - name: 运行单元测试
        env:
          PYTHONPATH: backend
        run: |
          python -m pytest backend/tests/test_agent_financial_calc.py \
            backend/tests/test_param_injection.py \
            backend/tests/test_retry.py \
            backend/tests/test_logger.py \
            backend/tests/test_auth.py \
            -q --tb=short
