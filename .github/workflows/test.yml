name: 测试

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install redis httpx2

      - name: 下载 Embedding 模型
        run: |
          python -c "
          from sentence_transformers import SentenceTransformer
          SentenceTransformer('BAAI/bge-small-zh-v1.5', cache_folder='./data/models')
          "

      - name: 运行单元测试
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CHROMA_PERSIST_DIR: /tmp/chroma_test
          LOCAL_MODEL_PATH: ./data/models/BAAI/bge-small-zh-v1___5
        run: |
          python -m pytest backend/tests/ \
            --ignore=backend/tests/test_table_extraction.py \
            --ignore=backend/tests/test_hybrid_search.py \
            --ignore=backend/tests/test_evaluator.py \
            --ignore=backend/tests/test_mcp_tools.py \
            --ignore=backend/tests/test_entity_router.py \
            -v \
            --tb=short \
            --timeout=60

      - name: 运行集成测试
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python -m pytest backend/tests/test_integration.py -v --tb=short --timeout=120
