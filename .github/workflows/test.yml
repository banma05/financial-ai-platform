name: 测试

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖（轻量，仅测试所需）
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 运行单元测试
        env:
          PYTHONPATH: backend
        run: |
          # ✅ rag/__init__.py 已改为惰性加载——轻量子模块可安全导入
          # V8.2: 新增 test_text_utils/test_corpus_monitor/test_integration（mock 解除重依赖）
          # 🔒 仍排除依赖重模型（sentence_transformers/pymupdf）的测试：
          #    - test_pdf_loader.py: 需要 pymupdf
          #    - test_hybrid_search.py: 需要 sentence_transformers + chromadb
          #    - test_table_extraction.py: 需要 pymupdf + camelot
          python -m pytest \
            backend/tests/test_agent_financial_calc.py \
            backend/tests/test_param_injection.py \
            backend/tests/test_retry.py \
            backend/tests/test_logger.py \
            backend/tests/test_auth.py \
            backend/tests/test_dataset.py \
            backend/tests/test_mcp_tools.py \
            backend/tests/test_entity_router.py \
            backend/tests/test_evaluator.py \
            backend/tests/test_query_processor.py \
            backend/tests/test_agent_planner.py \
            backend/tests/test_text_utils.py \
            backend/tests/test_corpus_monitor.py \
            backend/tests/test_integration.py \
            -q --tb=short

  frontend-test:
    runs-on: ubuntu-latest
    # V8.1 D20: 新增前端测试 Job

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        working-directory: web
        run: npm ci

      - name: 运行前端测试
        working-directory: web
        run: npm test
