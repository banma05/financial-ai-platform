name: 测试

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖（轻量，仅测试所需）
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 运行单元测试
        env:
          PYTHONPATH: backend
        run: |
          # ✅ rag/__init__.py 已改为惰性加载——轻量子模块（entity_router/corpus_manager/
          #    evaluator/query_processor/model_router）可安全导入，不再触发全家桶依赖。
          # 🔒 仍排除 3 个（子模块自身导入重依赖）：
          #   test_hybrid_search  → hybrid_search.py → sentence_transformers
          #   test_table_extraction → loader.py → pymupdf
          #   test_integration    → retriever.py → hybrid_search → sentence_transformers
          python -m pytest \
            backend/tests/test_agent_financial_calc.py \
            backend/tests/test_param_injection.py \
            backend/tests/test_retry.py \
            backend/tests/test_logger.py \
            backend/tests/test_auth.py \
            backend/tests/test_dataset.py \
            backend/tests/test_mcp_tools.py \
            backend/tests/test_entity_router.py \
            backend/tests/test_corpus_monitor.py \
            backend/tests/test_evaluator.py \
            backend/tests/test_query_processor.py \
            backend/tests/test_agent_planner.py \
            -q --tb=short
