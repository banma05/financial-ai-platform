name: 测试

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖（轻量，仅测试所需）
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 运行单元测试
        env:
          PYTHONPATH: backend
        run: |
          # ✅ rag/__init__.py 已改为条件导入（仅 Windows 预加载 sentence_transformers）
          #    Linux CI 环境可安全导入轻量 rag 子模块（model_router/jieba/evaluator 等）
          # 🔒 仍排除（子模块自身导入 ChromaDB/torch/sentence-transformers/PDF libs）：
          #   test_hybrid_search, test_table_extraction, test_integration
          python -m pytest \
            backend/tests/test_agent_financial_calc.py \
            backend/tests/test_param_injection.py \
            backend/tests/test_retry.py \
            backend/tests/test_logger.py \
            backend/tests/test_auth.py \
            backend/tests/test_dataset.py \
            backend/tests/test_mcp_tools.py \
            backend/tests/test_entity_router.py \
            backend/tests/test_corpus_monitor.py \
            backend/tests/test_evaluator.py \
            backend/tests/test_query_processor.py \
            backend/tests/test_agent_planner.py \
            -q --tb=short
