name: 测试

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖（轻量，仅测试所需）
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 运行单元测试
        env:
          PYTHONPATH: backend
        run: |
          # ✅ 能安全运行的测试（不触发 rag/__init__.py → sentence_transformers）：
          # 🔒 排除（函数体/模块级触发 rag.* → GPU/ChromaDB/sentence-transformers）：
          #   test_integration, test_evaluator, test_hybrid_search, test_query_processor,
          #   test_entity_router, test_corpus_monitor, test_table_extraction, test_agent_planner
          python -m pytest \
            backend/tests/test_agent_financial_calc.py \
            backend/tests/test_param_injection.py \
            backend/tests/test_retry.py \
            backend/tests/test_logger.py \
            backend/tests/test_auth.py \
            backend/tests/test_dataset.py \
            backend/tests/test_mcp_tools.py \
            -q --tb=short
