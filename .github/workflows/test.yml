name: 测试

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行单元测试（纯逻辑，无需GPU/LLM）
        run: |
          cd backend
          python -m pytest tests/test_agent_planner.py \
            tests/test_agent_financial_calc.py \
            tests/test_param_injection.py \
            tests/test_retry.py \
            tests/test_logger.py \
            tests/test_corpus_monitor.py \
            tests/test_integration.py \
            tests/test_auth.py \
            tests/test_dataset.py \
            -q --tb=short
