name: 测试

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行单元测试（轻量，跳过GPU和LLM依赖测试）
        run: |
          python -m pytest backend/tests/ \
            --ignore=backend/tests/test_table_extraction.py \
            --ignore=backend/tests/test_hybrid_search.py \
            --ignore=backend/tests/test_evaluator.py \
            --ignore=backend/tests/test_mcp_tools.py \
            --ignore=backend/tests/test_entity_router.py \
            --ignore=backend/tests/test_query_processor.py \
            -q --tb=short
