name: 测试

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖（轻量，仅测试所需）
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 运行单元测试
        env:
          PYTHONPATH: backend
        run: |
          # ✅ 安全运行的 7 个测试（不触发 rag/__init__.py 全家桶导入）：
          # 🔒 排除 5 个（需 rag/__init__.py 惰性加载改造后解除）：
          #   test_entity_router / test_corpus_monitor / test_evaluator /
          #   test_query_processor / test_agent_planner / test_table_extraction /
          #   test_hybrid_search / test_integration
          # ⚠️ 根因：rag/__init__.py 在模块导入时即加载全部子模块
          #   （loader→pymupdf, vector_store→chromadb, hybrid_search→sentence_transformers），
          #   需要像 agent/__init__.py 一样改为惰性加载。
          python -m pytest \
            backend/tests/test_agent_financial_calc.py \
            backend/tests/test_param_injection.py \
            backend/tests/test_retry.py \
            backend/tests/test_logger.py \
            backend/tests/test_auth.py \
            backend/tests/test_dataset.py \
            backend/tests/test_mcp_tools.py \
            -q --tb=short
